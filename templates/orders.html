<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place Order - RAVTO GLOBAL LTD</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f1f5f9;
}

/* NAVBAR */
.navbar{
    background:#0f172a;
    padding:15px 40px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    padding:8px 14px;
    border-radius:6px;
    background:#2563eb;
}

/* FORM CONTAINER */
.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#0f172a;
}

/* INPUTS */
input, select, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#10b981;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#059669;
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>RAVTO GLOBAL LTD</b></div>
    <div>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
    </div>
</div>

<!-- ORDER FORM -->
<div class="container">

    <h2>Place Your Order</h2>

    <form method="POST" action="{{ url_for('orders') }}">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="text" name="phone" required>

        <label>Category</label>
        <select name="category" required>
            <option value="ICT">ICT Systems</option>
            <option value="Electrical">Electrical Engineering</option>
            <option value="Solar">Solar Systems</option>
            <option value="Electronics">Electronics</option>
        </select>

        <label>Components / Items</label>
        <textarea name="items" placeholder="e.g CCTV camera, solar panel, inverter..." required></textarea>

        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>

        <label>Date of Order</label>
        <input type="date" name="order_date" required>

        <button type="submit">Submit Order</button>

    </form>

</div>

</body>
</html>
