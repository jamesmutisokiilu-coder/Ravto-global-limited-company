<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVTO GLOBAL LTD - Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
            url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600&auto=format&fit=crop')
            no-repeat center center/cover;

            overflow:hidden;
            position:relative;
        }

        /* GLOWING CIRCLES */

        .circle1,
        .circle2,
        .circle3{
            position:absolute;
            border-radius:50%;
            backdrop-filter:blur(5px);
        }

        .circle1{
            width:260px;
            height:260px;
            top:40px;
            left:70px;
            background:rgba(37,99,235,0.25);
        }

        .circle2{
            width:190px;
            height:190px;
            bottom:50px;
            right:90px;
            background:rgba(16,185,129,0.25);
        }

        .circle3{
            width:130px;
            height:130px;
            top:120px;
            right:250px;
            background:rgba(220,38,38,0.20);
        }

        /* LOGIN CARD */

        .container{

            width:430px;

            background:rgba(255,255,255,0.10);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.18);

            padding:40px;

            border-radius:28px;

            box-shadow:0 10px 40px rgba(0,0,0,0.55);

            color:white;

            position:relative;
            z-index:2;

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* LOGO */

        .logo{

            width:100px;
            height:100px;

            border-radius:50%;

            overflow:hidden;

            margin:0 auto 20px;

            border:4px solid white;

            box-shadow:0 5px 20px rgba(0,0,0,0.5);
        }

        .logo img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        h2{
            text-align:center;
            font-size:34px;
            margin-bottom:10px;
            letter-spacing:1px;
        }

        .subtitle{
            text-align:center;
            color:#d1d5db;
            margin-bottom:30px;
            font-size:15px;
            line-height:1.6;
        }

        /* FLASH MESSAGE */

        .flash-message{
            background:rgba(239,68,68,0.25);
            border:1px solid rgba(255,255,255,0.1);
            padding:12px;
            border-radius:12px;
            margin-bottom:20px;
            text-align:center;
            color:white;
            font-size:14px;
        }

        /* FORM */

        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            color:#f1f5f9;
            font-weight:bold;
        }

        input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:14px;

            outline:none;

            background:rgba(255,255,255,0.15);

            color:white;

            font-size:15px;

            transition:0.3s;
        }

        input::placeholder{
            color:#d1d5db;
        }

        input:focus{
            border:2px solid #60a5fa;
            background:rgba(255,255,255,0.22);
            transform:scale(1.02);
        }

        /* BUTTON */

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:14px;

            background:linear-gradient(135deg, #2563eb, #1d4ed8);

            color:white;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s ease;

            box-shadow:0 5px 15px rgba(37,99,235,0.4);
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(37,99,235,0.6);
        }

        /* EXTRA INFO */

        .bottom-text{
            text-align:center;
            margin-top:22px;
            color:#d1d5db;
            font-size:13px;
        }

        /* MOBILE */

        @media(max-width:500px){

            .container{
                width:92%;
                padding:30px 25px;
            }

            h2{
                font-size:28px;
            }

            .circle1{
                width:160px;
                height:160px;
                left:-40px;
            }

            .circle2{
                width:130px;
                height:130px;
                right:-30px;
            }

            .circle3{
                display:none;
            }
        }

    </style>
</head>

<body>

    <!-- BACKGROUND DECORATION -->

    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>

    <!-- LOGIN CARD -->

    <div class="container">

        <!-- LOGO -->

        <div class="logo">
            <img src="/static/images/logo1.png" alt="Logo">
        </div>

        <h2>Admin Login</h2>

        <p class="subtitle">
            Solar Energy • Electrical Engineering • ICT Solutions • Security Systems
        </p>

        <!-- FLASH MESSAGES -->

      

        <!-- LOGIN FORM -->

        <form method="POST" action="{{ url_for('admin_login') }}">

            <div class="form-group">

                <label>Admin Username</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter admin username"
                    required
                >

            </div>

            <div class="form-group">

                <label>Admin Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter admin password"
                    required
                >

            </div>

            <button type="submit">
                Access Dashboard
            </button>

        </form>

        <div class="bottom-text">
            © 2026 RAVTO GLOBAL LTD | Secure Admin System
        </div>

    </div>

</body>
</html>
